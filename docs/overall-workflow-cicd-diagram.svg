<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1500" viewBox="0 0 1900 1500" role="img" aria-labelledby="title desc">
  <title id="title">Sports Planning Assistant overall workflow and CI/CD diagram</title>
  <desc id="desc">End-to-end diagram showing the Sports Planning Assistant delivery pipeline from developer changes and GitHub Actions to Docker Hub and Kubernetes, plus the runtime request flow through Streamlit, CrewAI agents, tools, OpenAI, and the sports API.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7f2ea"/>
      <stop offset="100%" stop-color="#e7f1f7"/>
    </linearGradient>
    <linearGradient id="navy" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#163b50"/>
      <stop offset="100%" stop-color="#1e6676"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#edf7fb"/>
    </linearGradient>
    <linearGradient id="cardSand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fbf3e7"/>
    </linearGradient>
    <linearGradient id="cardMint" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef8f0"/>
    </linearGradient>
    <linearGradient id="cardRose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f9eef1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17343d" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#39535d"/>
    </marker>
    <marker id="softArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#6a8189"/>
    </marker>
    <style>
      .title { font: 700 36px 'Segoe UI', Arial, sans-serif; fill: #17343d; }
      .subtitle { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #536c75; }
      .section { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #17343d; letter-spacing: 0.8px; }
      .card-title { font: 700 21px 'Segoe UI', Arial, sans-serif; fill: #17343d; }
      .card-subtitle { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #5a737d; letter-spacing: 1px; text-transform: uppercase; }
      .body { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #314b54; }
      .small { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #5e7780; }
      .code { font: 600 13px Consolas, 'Courier New', monospace; fill: #28424b; }
      .label { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #49626c; }
      .badge { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #153b50; }
      .lane-note { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #274049; }
      .dash { stroke-dasharray: 8 8; }
    </style>
  </defs>

  <rect width="1900" height="1500" fill="url(#bg)"/>

  <text x="70" y="72" class="title">Sports Planning Assistant: Overall Workflow</text>
  <text x="70" y="102" class="subtitle">One view of how code changes move through CI/CD into Kubernetes, and how a live sports request is handled once the app is running</text>

  <text x="70" y="156" class="section">CI/CD PIPELINE AS CONFIGURED</text>

  <g filter="url(#shadow)">
    <rect x="70" y="190" width="250" height="180" rx="24" fill="url(#cardBlue)" stroke="#b8d5e2" stroke-width="2"/>
    <text x="102" y="232" class="card-subtitle">DEVELOPER STEP</text>
    <text x="102" y="264" class="card-title">Local Repository</text>
    <text x="102" y="292" class="small">Typical files changed:</text>
    <text x="102" y="318" class="code">app.py</text>
    <text x="102" y="340" class="code">Dockerfile</text>
    <text x="102" y="362" class="code">k8s/*.yaml</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="370" y="190" width="250" height="180" rx="24" fill="url(#cardBlue)" stroke="#b8d5e2" stroke-width="2"/>
    <text x="402" y="232" class="card-subtitle">SOURCE CONTROL</text>
    <text x="402" y="264" class="card-title">GitHub Main Branch</text>
    <text x="402" y="300" class="body">A push to</text>
    <text x="402" y="325" class="code">main</text>
    <text x="402" y="350" class="body">triggers the workflow file</text>
    <text x="402" y="375" class="code">.github/workflows/main.yml</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="670" y="170" width="690" height="420" rx="30" fill="#ffffff" stroke="#a9bdc7" stroke-width="2.5"/>
    <rect x="670" y="170" width="690" height="94" rx="30" fill="url(#navy)"/>
    <path d="M670 234 Q670 264 700 264 L1330 264 Q1360 264 1360 234" fill="url(#navy)"/>
    <text x="710" y="224" style="font:700 25px 'Segoe UI', Arial, sans-serif; fill:#ffffff;">GitHub Actions Workflow</text>
    <text x="710" y="249" style="font:400 14px 'Segoe UI', Arial, sans-serif; fill:#dcecf2;">Self-hosted runner executes the delivery job exactly as defined in the current repository</text>

    <rect x="720" y="296" width="265" height="250" rx="22" fill="url(#cardSand)" stroke="#d7c9ad" stroke-width="2"/>
    <text x="750" y="334" class="card-subtitle">JOB CONTEXT</text>
    <text x="750" y="366" class="card-title">deploy</text>
    <text x="750" y="398" class="badge">runs-on = self-hosted</text>
    <text x="750" y="426" class="badge">event = push to main</text>
    <text x="750" y="462" class="small">Secrets used by workflow:</text>
    <text x="750" y="486" class="code">DOCKER_USERNAME</text>
    <text x="750" y="508" class="code">DOCKER_PASSWORD</text>
    <text x="750" y="530" class="code">KUBE_CONFIG</text>

    <rect x="1015" y="296" width="295" height="250" rx="22" fill="url(#cardSand)" stroke="#d7c9ad" stroke-width="2"/>
    <text x="1045" y="334" class="card-subtitle">WORKFLOW STEPS</text>
    <text x="1045" y="366" class="small">1. Checkout code with</text>
    <text x="1045" y="388" class="code">actions/checkout@v3</text>
    <text x="1045" y="420" class="small">2. Login to Docker Hub with</text>
    <text x="1045" y="442" class="code">docker/login-action@v2</text>
    <text x="1045" y="474" class="small">3. Build and push</text>
    <text x="1045" y="496" class="code">sports-ai-app:latest</text>
    <text x="1045" y="528" class="small">4. Setup kubectl and write kubeconfig</text>
    <text x="1045" y="550" class="code">azure/setup-kubectl@v3</text>
    <text x="1045" y="582" class="small">5. Apply manifests and restart deployment</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1410" y="190" width="210" height="180" rx="24" fill="url(#cardMint)" stroke="#bcd8c3" stroke-width="2"/>
    <text x="1440" y="232" class="card-subtitle">IMAGE REGISTRY</text>
    <text x="1440" y="264" class="card-title">Docker Hub</text>
    <text x="1440" y="300" class="body">Receives the freshly built</text>
    <text x="1440" y="325" class="code">sports-ai-app:latest</text>
    <text x="1440" y="350" class="body">image used by the deployment.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1660" y="190" width="180" height="180" rx="24" fill="url(#cardMint)" stroke="#bcd8c3" stroke-width="2"/>
    <text x="1690" y="232" class="card-subtitle">DELIVERY TARGET</text>
    <text x="1690" y="264" class="card-title">Kubernetes</text>
    <text x="1690" y="300" class="small">Manifests applied:</text>
    <text x="1690" y="324" class="code">k8s/deployment.yaml</text>
    <text x="1690" y="346" class="code">k8s/service.yaml</text>
  </g>

  <line x1="320" y1="280" x2="370" y2="280" stroke="#39535d" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="328" y="260" class="label">commit and push</text>

  <line x1="620" y1="280" x2="670" y2="280" stroke="#39535d" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="626" y="260" class="label">workflow trigger</text>

  <line x1="1360" y1="280" x2="1410" y2="280" stroke="#39535d" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="1368" y="260" class="label">build and push image</text>

  <path d="M1230 590 C1230 660 1750 660 1750 370" fill="none" stroke="#39535d" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="1384" y="642" class="label">kubectl apply + rollout restart</text>

  <line x1="1620" y1="280" x2="1660" y2="280" stroke="#39535d" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="1600" y="260" class="label">pullable image</text>

  <text x="70" y="720" class="section">RUNNING APPLICATION FLOW</text>

  <g filter="url(#shadow)">
    <rect x="330" y="760" width="1170" height="620" rx="32" fill="#ffffff" stroke="#a9bdc7" stroke-width="2.5"/>
    <rect x="330" y="760" width="1170" height="96" rx="32" fill="url(#navy)"/>
    <path d="M330 824 Q330 856 362 856 L1468 856 Q1500 856 1500 824" fill="url(#navy)"/>
    <text x="370" y="818" style="font:700 25px 'Segoe UI', Arial, sans-serif; fill:#ffffff;">Kubernetes Runtime</text>
    <text x="370" y="844" style="font:400 14px 'Segoe UI', Arial, sans-serif; fill:#dcecf2;">The deployed container serves Streamlit, orchestrates CrewAI tasks, and calls external services during a live request</text>
  </g>

  <path d="M1750 370 C1750 520 1480 520 1480 760" fill="none" stroke="#6a8189" stroke-width="3" class="dash" marker-end="url(#softArrow)"/>
  <text x="1555" y="628" class="label">running version after deployment</text>

  <g filter="url(#shadow)">
    <rect x="80" y="1035" width="190" height="150" rx="24" fill="url(#cardBlue)" stroke="#b8d5e2" stroke-width="2"/>
    <text x="110" y="1077" class="card-subtitle">END USER</text>
    <text x="110" y="1109" class="card-title">Browser Client</text>
    <text x="110" y="1145" class="body">User enters a sports</text>
    <text x="110" y="1170" class="body">goal and reads the</text>
    <text x="110" y="1195" class="body">analysis output.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="370" y="900" width="240" height="120" rx="22" fill="url(#cardMint)" stroke="#bcd8c3" stroke-width="2"/>
    <text x="402" y="938" class="card-subtitle">DEPLOYMENT</text>
    <text x="402" y="970" class="card-title">sports-ai-deployment</text>
    <text x="402" y="998" class="small">2 replicas, container port 8501,</text>
    <text x="402" y="1020" class="small">image = sports-ai-app:latest</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="650" y="900" width="240" height="120" rx="22" fill="url(#cardMint)" stroke="#bcd8c3" stroke-width="2"/>
    <text x="682" y="938" class="card-subtitle">SERVICE</text>
    <text x="682" y="970" class="card-title">sports-ai-service</text>
    <text x="682" y="998" class="small">NodePort</text>
    <text x="682" y="1020" class="code">80 -> 8501 -> 30007</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="930" y="900" width="240" height="120" rx="22" fill="url(#cardMint)" stroke="#bcd8c3" stroke-width="2"/>
    <text x="962" y="938" class="card-subtitle">RUNTIME SETTINGS</text>
    <text x="962" y="970" class="card-title">Secrets and Env</text>
    <text x="962" y="998" class="small">K8s secret injects runtime keys.</text>
    <text x="962" y="1020" class="small">Local development uses .env.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="370" y="1060" width="830" height="280" rx="24" fill="url(#cardSand)" stroke="#d7c9ad" stroke-width="2"/>
    <text x="404" y="1100" class="card-subtitle">APPLICATION POD</text>
    <text x="404" y="1132" class="card-title">Streamlit + CrewAI Runtime</text>

    <rect x="404" y="1160" width="220" height="92" rx="18" fill="url(#cardBlue)" stroke="#b8d5e2" stroke-width="1.8"/>
    <text x="432" y="1196" class="card-subtitle">PRESENTATION</text>
    <text x="432" y="1225" class="card-title">app.py</text>
    <text x="432" y="1248" class="small">text input, button, spinner, output</text>

    <rect x="654" y="1150" width="512" height="104" rx="18" fill="url(#cardBlue)" stroke="#b8d5e2" stroke-width="1.8"/>
    <text x="684" y="1186" class="card-subtitle">ORCHESTRATION</text>
    <text x="684" y="1215" class="card-title">crew_setup.py</text>
    <text x="684" y="1238" class="small">Crew process = sequential, tracing = true, kickoff starts the 4-task execution chain</text>

    <rect x="404" y="1278" width="170" height="44" rx="14" fill="#fef7ee" stroke="#d7c9ad" stroke-width="1.5"/>
    <text x="421" y="1306" class="lane-note">1. Goal analysis</text>
    <rect x="596" y="1278" width="170" height="44" rx="14" fill="#fef7ee" stroke="#d7c9ad" stroke-width="1.5"/>
    <text x="626" y="1306" class="lane-note">2. Planning</text>
    <rect x="788" y="1278" width="170" height="44" rx="14" fill="#fef7ee" stroke="#d7c9ad" stroke-width="1.5"/>
    <text x="803" y="1306" class="lane-note">3. Data retrieval</text>
    <rect x="980" y="1278" width="170" height="44" rx="14" fill="#fef7ee" stroke="#d7c9ad" stroke-width="1.5"/>
    <text x="1002" y="1306" class="lane-note">4. Analysis</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1230" y="1060" width="230" height="280" rx="24" fill="url(#cardMint)" stroke="#bcd8c3" stroke-width="2"/>
    <text x="1262" y="1100" class="card-subtitle">TOOL LAYER</text>
    <text x="1262" y="1132" class="card-title">stats_tool.py</text>
    <text x="1262" y="1164" class="small">fetch_team_data(team)</text>
    <text x="1262" y="1188" class="small">fetch_league_data(league)</text>
    <text x="1262" y="1226" class="card-subtitle">HTTP ADAPTER</text>
    <text x="1262" y="1254" class="card-title">sports_api.py</text>
    <text x="1262" y="1284" class="small">requests.get(...) to search team</text>
    <text x="1262" y="1308" class="small">and search league endpoints</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1540" y="950" width="280" height="160" rx="24" fill="url(#cardRose)" stroke="#dec0c9" stroke-width="2"/>
    <text x="1572" y="992" class="card-subtitle">EXTERNAL MODEL SERVICE</text>
    <text x="1572" y="1024" class="card-title">OpenAI API</text>
    <text x="1572" y="1060" class="small">Agents use the configured LLM</text>
    <text x="1572" y="1084" class="code">gpt-4o-mini</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1540" y="1150" width="280" height="180" rx="24" fill="url(#cardRose)" stroke="#dec0c9" stroke-width="2"/>
    <text x="1572" y="1192" class="card-subtitle">EXTERNAL SPORTS DATA</text>
    <text x="1572" y="1224" class="card-title">Sports API Service</text>
    <text x="1572" y="1260" class="small">Team and league lookups return JSON</text>
    <text x="1572" y="1284" class="small">for the data retrieval and analysis flow.</text>
  </g>

  <line x1="270" y1="1110" x2="650" y2="960" stroke="#39535d" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="360" y="1044" class="label">browser request reaches service</text>

  <path d="M770 1020 C770 1090 515 1090 515 1160" fill="none" stroke="#39535d" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="610" y="1088" class="label">service routes to app container</text>

  <line x1="624" y1="1206" x2="654" y2="1206" stroke="#39535d" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="630" y="1186" class="label">crew.kickoff(inputs)</text>

  <path d="M910 1254 C910 1266 489 1266 489 1278" fill="none" stroke="#39535d" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="694" y="1270" class="label">sequential tasks begin</text>

  <line x1="574" y1="1300" x2="596" y2="1300" stroke="#39535d" stroke-width="3.5" marker-end="url(#arrow)"/>
  <line x1="766" y1="1300" x2="788" y2="1300" stroke="#39535d" stroke-width="3.5" marker-end="url(#arrow)"/>
  <line x1="958" y1="1300" x2="980" y2="1300" stroke="#39535d" stroke-width="3.5" marker-end="url(#arrow)"/>

  <path d="M958 1300 C1080 1300 1080 1200 1230 1200" fill="none" stroke="#39535d" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="1060" y="1276" class="label">tool selection and API calls</text>

  <line x1="1460" y1="1240" x2="1540" y2="1240" stroke="#39535d" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="1468" y="1220" class="label">HTTP request</text>

  <path d="M1540 1030 C1480 1030 1480 1186 1166 1186" fill="none" stroke="#6a8189" stroke-width="3" class="dash" marker-end="url(#softArrow)"/>
  <text x="1330" y="1006" class="label">all agents share LLM access</text>

  <path d="M1230 1286 C1130 1286 1130 1300 1150 1300" fill="none" stroke="#39535d" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="1122" y="1328" class="label">retrieved data feeds final analysis</text>

  <path d="M1065 1278 C1065 1128 514 1128 514 1160" fill="none" stroke="#39535d" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="762" y="1104" class="label">final insights returned to UI</text>

  <path d="M515 1252 C515 1320 175 1320 175 1185" fill="none" stroke="#39535d" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="272" y="1348" class="label">rendered response back to user</text>

  <rect x="70" y="1424" width="760" height="38" rx="12" fill="#ffffff" opacity="0.92" stroke="#d7e3e8" stroke-width="1.5"/>
  <text x="94" y="1449" class="small">Solid arrows = active deployment or runtime flow. Dashed arrows = shared dependencies and post-deploy handoff into the running environment.</text>
</svg>
